title: Execution of a File With a Suspicious Double Extension
id: c1855df0-df7c-45d2-8eba-d3113ed8fd77
status: experimental
description: Detects command or script interpreters executing a path that uses a document or image extension followed by a dangerous extension.
references:
    - https://attack.mitre.org/techniques/T1036/007/
author: ThreatHuntSim
date: 2026-07-14
tags:
    - attack.execution
    - attack.t1204.002
    - attack.defense-evasion
    - attack.t1036.007
logsource:
    product: windows
    category: process_creation
detection:
    selection_image:
        Image|endswith:
            - '\cmd.exe'
            - '\powershell.exe'
            - '\pwsh.exe'
            - '\wscript.exe'
            - '\cscript.exe'
            - '\mshta.exe'
    selection_path:
        CommandLine|re: '(?i)\.(?:pdf|docx?|xlsx?|pptx?|rtf|txt|jpg|jpeg|png|gif)\.(?:exe|dll|scr|cmd|bat|ps1|js|jse|vbs|vbe|wsf|hta|lnk|msi)(?:"|\s|$)'
    condition: selection_image and selection_path
falsepositives:
    - Malware analysis labs and intentionally named administrative test files
level: high
