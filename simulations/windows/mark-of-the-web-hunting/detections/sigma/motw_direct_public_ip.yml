title: Mark of the Web HostUrl Uses a Direct Public IP
id: 253d4817-aec1-4015-86f1-b173b75f94c8
status: experimental
description: Detects a Zone.Identifier stream whose HostUrl uses an IPv4 literal outside common private, loopback, and link local ranges.
references:
    - https://www.paloaltonetworks.com/blog/security-operations/threat-hunting-with-mark-of-the-web-using-cortex-xdr/
    - https://learn.microsoft.com/en-us/sysinternals/downloads/sysmon
author: ThreatHuntSim
date: 2026-07-14
tags:
    - attack.command-and-control
    - attack.t1105
logsource:
    product: windows
    category: create_stream_hash
detection:
    selection_stream:
        TargetFilename|endswith: ':Zone.Identifier'
        Contents|contains: 'HostUrl='
    selection_ip:
        Contents|re: '(?i)HostUrl=(?:https?|ftp)://(?!(?:10|127)\.|169\.254\.|192\.168\.|172\.(?:1[6-9]|2\d|3[01])\.)(?:\d{1,3}\.){3}\d{1,3}(?::\d+)?(?:/|$)'
    condition: selection_stream and selection_ip
falsepositives:
    - Approved appliances, proxies, test ranges, and internal services addressed by IP
level: medium
